# .github/workflows/qa-pipeline.yml
# ══════════════════════════════════════════════════════════════════════════
# QA-AI Framework – CI/CD Pipeline
#
# Triggers:
#   • push to main / develop
#   • pull_request to main
#   • daily schedule (catches external API regressions)
#   • manual workflow_dispatch (run on demand)
#
# Shift-left design:
#   1. Lint + static analysis runs in <30s – fails fast before tests
#   2. Smoke tests (~8 tests) run before full suite – fails faster
#   3. Full parallel suite across Chrome + Firefox
#   4. AI analysis runs post-suite (async, non-blocking for PR status)
#   5. HTML report published to GitHub Pages
# ══════════════════════════════════════════════════════════════════════════

name: QA Automation Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 06:00 UTC (catches external API drift)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      test_scope:
        description: "Test scope to run"
        required: false
        default: "all"
        type: choice
        options: [all, smoke, api, ui]

env:
  NODE_VERSION: "20"
  BASE_URL: "https://reqres.in"
  API_BASE_URL: "https://reqres.in/api"
  CI: "true"

jobs:
  # ── Job 1: Lint & Static Analysis ─────────────────────────────────────────
  lint:
    name: "Lint & Static Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint source files
        run: npm run lint --if-present

      - name: Check for hardcoded secrets
        run: |
          if grep -r "sk-ant-\|ANTHROPIC_API_KEY=sk" src/ tests/ --include="*.js" 2>/dev/null; then
            echo "❌ Hardcoded secrets detected!"
            exit 1
          fi
          echo "✓ No hardcoded secrets found"

  # ── Job 2: Smoke Tests (fast gate) ────────────────────────────────────────
  smoke:
    name: "Smoke Tests"
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only for smoke)
        run: npx playwright install chromium --with-deps

      - name: Run smoke tests
        run: npx playwright test --project=chromium-smoke --grep "@smoke"
        env:
          BASE_URL: ${{ env.BASE_URL }}

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: reports/
          retention-days: 7

  # ── Job 3: Full Test Suite ─────────────────────────────────────────────────
  full-suite:
    name: "Full Suite – ${{ matrix.project }}"
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 20
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.test_scope == 'all'

    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, api]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run ${{ matrix.project }} tests
        run: npx playwright test --project=${{ matrix.project }}
        env:
          BASE_URL: ${{ env.BASE_URL }}
          API_BASE_URL: ${{ env.API_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.project }}
          path: |
            reports/
            test-results/
          retention-days: 14

  # ── Job 4: AI Failure Analysis ────────────────────────────────────────────
  ai-analysis:
    name: "AI Failure Analysis"
    runs-on: ubuntu-latest
    needs: full-suite
    if: always() && needs.full-suite.result == 'failure'
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: reports/
          merge-multiple: true

      - name: Run AI failure analysis
        run: npm run analyze:failures
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload AI analysis
        uses: actions/upload-artifact@v4
        with:
          name: ai-analysis
          path: reports/ai-analysis.json
          retention-days: 30

  # ── Job 5: Merge Reports & Publish ────────────────────────────────────────
  publish-report:
    name: "Publish HTML Report"
    runs-on: ubuntu-latest
    needs: full-suite
    if: always() && github.ref == 'refs/heads/main'
    timeout-minutes: 5

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download HTML report
        uses: actions/download-artifact@v4
        with:
          name: results-chromium
          path: reports/

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/html/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        continue-on-error: true # Don't fail pipeline if pages not configured
